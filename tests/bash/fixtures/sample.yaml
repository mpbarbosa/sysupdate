application:
  name: "testapp"
  display_name: "Test App"

null_key: ~

version:
  source: "github"
  github_owner: "test-owner"
  github_repo: "test-repo"
  command: "echo testapp 1.2.3"
  regex: 'testapp ([0-9]+\.[0-9]+\.[0-9]+)'

messages:
  checking_updates: "Checking test app updates..."
  update_success: "Test app updated"
